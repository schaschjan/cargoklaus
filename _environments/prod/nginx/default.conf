proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

# Rate limiting zones (very relaxed for dev environment)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

upstream nextjs_upstream {
  server cargoklaus-nextjs:3000;
}

# Map X-Forwarded-Proto from Traefik (defaults to https since Traefik handles TLS)
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
  default $http_x_forwarded_proto;
  '' https;
}

server {
    listen 8080;
    server_name www.cargoklaus.de www.cargo-klaus.de cargo-klaus.de;

    return 301 https://cargoklaus.de$request_uri;
}

server {
  listen 8080 default;
  server_tokens off;

  # Request size limits
  client_max_body_size 10M;
  client_body_buffer_size 128k;

  # Timeout configuration for proxied requests
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Security headers (HSTS removed as Traefik handles TLS termination)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Permissions-Policy - restrict browser features
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
  # Strict CSP
  add_header Content-Security-Policy " default-src 'self'; script-src 'self' 'unsafe-inline' https://90f2e974.sibforms.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://ip.disko.io https://cdn.disko.io data:; media-src 'self' https://cdn.disko.io; font-src 'self' data:; connect-src 'self' https://90f2e974.sibforms.com; frame-src https://90f2e974.sibforms.com; form-action 'self' https://90f2e974.sibforms.com; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests; " always;

  gzip on;
  gzip_proxied any;
  gzip_comp_level 4;
  gzip_types text/css application/javascript image/svg+xml;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection 'upgrade';
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
  proxy_cache_bypass $http_upgrade;

  location /api/ {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://nextjs_upstream;
  }

  location / {
    limit_req zone=general burst=20 nodelay;
    proxy_pass http://nextjs_upstream;
  }

  location /_next/static {
    proxy_cache STATIC;
    proxy_pass http://nextjs_upstream;
  }

  location /static {
    proxy_cache STATIC;
    proxy_ignore_headers Cache-Control;
    proxy_cache_valid 60m;
    proxy_pass http://nextjs_upstream;
  }

  # Enable access logs for security auditing (log rotation handled by Docker logging driver)
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;
}